<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request Grid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ===== WRAPPER ===== */
    .wrapper {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 852px;
      justify-content: center;
      align-items: flex-start;
    }

    /* ===== SIDE BOX (untuk gambar) ===== */
    .side-box {
      background-color: transparent;
      border-radius: 18px;
      width: 420px;
      max-width: 100%;
      flex-shrink: 0;
      align-self: stretch;
      box-shadow: 0 0 0 9999px #000000;
      position: relative;
      z-index: 0;
    }

    /* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
      max-width: 420px;
    }

    /* ===== CARD KOSONG ===== */
    .card {
      background-color: #242424;
      border-radius: 18px;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      user-select: none;
      border: none;
      outline: none;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .card:active { transform: scale(0.97); }
    .card .icon { font-size: 56px; color: #888; line-height: 1; font-weight: 300; }
    .card .label { font-size: 24px; color: #888; font-weight: 400; }

    /* ===== CARD TERISI ===== */
    .card.filled {
      background-color: #eee;
      align-items: stretch;
      justify-content: flex-start;
      padding: 0; gap: 0; cursor: default;
    }

    .card.filled .bg-blur {
      position: absolute; inset: -10px;
      width: calc(100% + 20px); height: calc(100% + 20px);
      object-fit: cover;
      filter: blur(16px) brightness(1.1) saturate(0.9);
      z-index: 0;
    }

    .card.filled .bright-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 18px; z-index: 1;
    }

    .card.filled .content {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      justify-content: space-between; padding: 10px;
    }

    .coin-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.40); backdrop-filter: blur(4px);
      border-radius: 20px; padding: 4px 10px 4px 5px;
    }

    .coin-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .coin-amount { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.02em; white-space: nowrap; }

    .avatar-wrap { display: flex; justify-content: center; align-items: center; flex: 1; }
    .avatar-circle { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; }
    .avatar-placeholder { width: 96px; height: 96px; border-radius: 50%; background: #bbb; }

    .bottom-row { display: flex; align-items: center; gap: 6px; }

    .name-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.50); backdrop-filter: blur(4px);
      border-radius: 20px; padding: 5px 12px;
      transform: translateY(0px);
    }
    .uname { font-size: 22px; color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
    .plus-icon { font-size: 28px; color: #fff; font-weight: 300; flex-shrink: 0; }

    .mic-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: transparent; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; margin-left: auto;
      transform: translateY(0px);
    }
    .mic-btn svg { width: 26px; height: 26px; }

    /* ===== FLOATING POPUP (tanpa overlay) ===== */
    .popup {
      position: fixed;
      /* Muncul di tengah-bawah layar, tidak menutupi seluruh halaman */
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      width: calc(100% - 32px);
      max-width: 380px;
      background: #2a2a2a;
      border-radius: 22px;
      padding: 6px 18px 22px;
      z-index: 200;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
      border: 1px solid #333;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.28s cubic-bezier(.32,1,.56,1);
    }

    .popup.open {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }

    /* Drag handle */
    .popup-handle-wrap {
      display: flex; justify-content: center;
      padding: 10px 0 6px; cursor: grab;
    }
    .popup-handle { width: 36px; height: 4px; background: #3a3a3a; border-radius: 4px; }

    /* Header popup */
    .popup-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .popup-title { color: #fff; font-size: 15px; font-weight: 600; }

    .btn-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: #333; border: none;
      color: #aaa; font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-close:hover { background: #444; color: #fff; }

    /* Upload foto */
    .upload-area {
      width: 100%;
      aspect-ratio: 16/6;
      border: 2px dashed #3a3a3a;
      border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; gap: 6px;
      color: #666; font-size: 13px;
      transition: border-color 0.2s;
      position: relative; overflow: hidden;
      background: #1e1e1e;
      margin-bottom: 14px;
    }

    .upload-area:hover { border-color: #666; }
    .upload-area .upload-icon { font-size: 24px; }

    .upload-area img.preview {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 12px;
      pointer-events: none;
    }

    .upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }

    /* Fields */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

    .field label {
      color: #666; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .field input {
      background: #1e1e1e;
      border: 1.5px solid #333;
      border-radius: 11px;
      padding: 11px 13px;
      color: #fff; font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #5ab8f5; }
    .field input::placeholder { color: #444; }

    .btn-save {
      width: 100%; padding: 13px;
      border-radius: 13px; border: none;
      background: #3a8fd4; color: #fff;
      font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-save:hover { background: #4aa0e8; }
    .btn-save:active { transform: scale(0.98); }

    .btn-delete {
      width: 100%; padding: 13px;
      border-radius: 13px; border: none;
      background: #3a2222; color: #e85c5c;
      font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      display: none;
      align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-delete.show { display: flex; }
    .btn-delete:hover { background: #4a2a2a; }
    .btn-delete:active { transform: scale(0.98); }
    .btn-delete svg { width: 16px; height: 16px; flex-shrink: 0; }

    .btn-video {
      width: 100%; padding: 13px;
      border-radius: 13px; border: none;
      background: #2a2a3a; color: #a0a8ff;
      font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-video:hover { background: #34344a; }
    .btn-video:active { transform: scale(0.98); }
    .btn-video svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ===== VIDEO OVERLAY (FULLSCREEN, TRANSPARAN) ===== */
    .video-overlay {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      background: transparent;
      z-index: 500;
      display: none;
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    .video-overlay.show { display: flex; }
    .video-overlay video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: bottom;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="side-box" id="sideBox"></div>
  <div class="grid" id="grid">
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  <button class="card" onclick="openPopup(this)"><span class="icon">+</span><span class="label">Request</span></button>
  </div>
</div>

<!-- FLOATING POPUP (tanpa overlay) -->
<div class="popup" id="popup">

  <div class="popup-handle-wrap" id="dragHandle">
    <div class="popup-handle"></div>
  </div>

  <div class="popup-header">
    <span class="popup-title">Isi Request</span>
    <button class="btn-close" onclick="closePopup()">✕</button>
  </div>

  <!-- Upload Foto -->
  <div class="upload-area" id="uploadArea">
    <span class="upload-icon">🖼️</span>
    <span id="uploadText">Ketuk untuk pilih foto</span>
    <input type="file" accept="image/*" id="photoInput" onchange="previewPhoto(event)" />
  </div>

  <!-- Nama -->
  <div class="field">
    <label>Nama</label>
    <input type="text" id="inputNama" placeholder="Masukkan nama..." maxlength="30" />
  </div>

  <!-- Koin -->
  <div class="field">
    <label>Koin</label>
    <input type="text" id="inputKoin" placeholder="Contoh: 202,9K" maxlength="20" />
  </div>

  <button class="btn-save" onclick="saveCard()">Simpan</button>
  <button class="btn-delete" id="btnDelete" onclick="deleteCard()">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 7h16M9 7V4.5A1.5 1.5 0 0 1 10.5 3h3A1.5 1.5 0 0 1 15 4.5V7M18 7l-.8 12.1A2 2 0 0 1 15.2 21H8.8a2 2 0 0 1-2-1.9L6 7" stroke="#e85c5c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="10" y1="11" x2="10" y2="16" stroke="#e85c5c" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="14" y1="11" x2="14" y2="16" stroke="#e85c5c" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    Hapus
  </button>
  <button class="btn-video" onclick="playVideoAnimation()">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="5,3 19,12 5,21" fill="#a0a8ff"/>
    </svg>
    SINGA
  </button>
</div>

<!-- VIDEO OVERLAY (FULLSCREEN, TRANSPARAN) -->
<div class="video-overlay" id="videoOverlay">
  <video id="animVideo" playsinline></video>
</div>

<script>
  const COIN_IMG = 'https://i.ibb.co.com/vxzCFJd6/Tanpa-judul.png';

  const MIC_OFF_SVG = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2a3 3 0 0 1 3 3v5a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" fill="#fff"/>
      <path d="M19 10a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V19H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 10z" fill="#fff"/>
      <line x1="5" y1="19" x2="19" y2="5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  `;

  let currentCard = null;
  let currentPhotoDataUrl = null;

  /* ---- Buka popup ---- */
  function openPopup(cardEl) {
    currentCard = cardEl;
    currentPhotoDataUrl = null;

    document.getElementById('photoInput').value = '';
    const area = document.getElementById('uploadArea');
    const prev = area.querySelector('img.preview');
    if (prev) prev.remove();

    const isFilled = cardEl.classList.contains('filled');
    const btnDelete = document.getElementById('btnDelete');

    if (isFilled) {
      btnDelete.classList.add('show');
      // Mode edit: isi form dengan data yang sudah ada
      const existingName = cardEl.querySelector('.uname');
      const existingCoin = cardEl.querySelector('.coin-amount');
      const existingImg = cardEl.querySelector('.bg-blur') || cardEl.querySelector('.avatar-circle');

      document.getElementById('inputNama').value = existingName ? existingName.textContent : '';
      document.getElementById('inputKoin').value = existingCoin ? existingCoin.textContent : '';

      if (existingImg) {
        currentPhotoDataUrl = existingImg.getAttribute('src');
        const p = document.createElement('img');
        p.className = 'preview';
        p.src = currentPhotoDataUrl;
        area.appendChild(p);
        area.querySelector('.upload-icon').style.display = 'none';
        document.getElementById('uploadText').style.display = 'none';
      } else {
        area.querySelector('.upload-icon').style.display = '';
        document.getElementById('uploadText').style.display = '';
      }
    } else {
      btnDelete.classList.remove('show');
      // Mode tambah baru: form kosong
      document.getElementById('inputNama').value = '';
      document.getElementById('inputKoin').value = '';
      area.querySelector('.upload-icon').style.display = '';
      document.getElementById('uploadText').style.display = '';
    }

    document.getElementById('popup').classList.add('open');
  }

  /* ---- Tutup popup ---- */
  function closePopup() {
    document.getElementById('popup').classList.remove('open');
    currentCard = null;
    currentPhotoDataUrl = null;
  }

  /* ---- Drag to dismiss (geser ke bawah untuk tutup) ---- */
  const popup = document.getElementById('popup');
  const handle = document.getElementById('dragHandle');
  let startY = 0, currentY = 0, isDragging = false;

  function onDragStart(e) {
    isDragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    popup.style.transition = 'none';
  }

  function onDragMove(e) {
    if (!isDragging) return;
    currentY = e.touches ? e.touches[0].clientY : e.clientY;
    const diff = Math.max(0, currentY - startY);
    popup.style.transform = `translateX(-50%) translateY(${diff}px)`;
  }

  function onDragEnd() {
    if (!isDragging) return;
    isDragging = false;
    popup.style.transition = '';
    const diff = currentY - startY;
    if (diff > 80) {
      popup.style.transform = '';
      closePopup();
    } else {
      popup.style.transform = '';
    }
  }

  handle.addEventListener('touchstart', onDragStart, { passive: true });
  document.addEventListener('touchmove', onDragMove, { passive: true });
  document.addEventListener('touchend', onDragEnd);
  handle.addEventListener('mousedown', onDragStart);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);

  /* ---- Preview foto ---- */
  function previewPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      currentPhotoDataUrl = ev.target.result;
      const area = document.getElementById('uploadArea');
      let prev = area.querySelector('img.preview');
      if (!prev) { prev = document.createElement('img'); prev.className = 'preview'; area.appendChild(prev); }
      prev.src = currentPhotoDataUrl;
      area.querySelector('.upload-icon').style.display = 'none';
      document.getElementById('uploadText').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function formatKoin(val) {
    const num = parseFloat(val.replace(/\./g,'').replace(',','.'));
    if (!isNaN(num) && val.match(/^[\d.,]+$/)) {
      if (num >= 1000000) return (num/1000000).toFixed(1).replace('.',',') + 'M';
      if (num >= 1000) return (num/1000).toFixed(1).replace('.',',') + 'K';
      return val;
    }
    return val;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function deleteCard() {
    if (!currentCard) return;
    const card = currentCard;

    card.classList.remove('filled');
    card.innerHTML = `<span class="icon">+</span><span class="label">Request</span>`;
    card.onclick = function() { openPopup(card); };

    closePopup();
  }

  function playVideoAnimation() {
    const overlay = document.getElementById('videoOverlay');
    const video = document.getElementById('animVideo');

    closePopup();

    video.src = 'singa-720.webm';
    video.currentTime = 0;
    video.muted = false;

    overlay.classList.add('show');

    video.play().catch(err => {
      console.error('Gagal memutar video:', err);
      overlay.classList.remove('show');
    });

    video.onended = function() {
      overlay.classList.remove('show');
      video.src = '';
    };
  }

  function saveCard() {
    const nama = document.getElementById('inputNama').value.trim();
    const koinRaw = document.getElementById('inputKoin').value.trim();
    if (!nama) { alert('Nama harus diisi!'); return; }
    if (!koinRaw) { alert('Koin harus diisi!'); return; }

    const koin = formatKoin(koinRaw);
    const card = currentCard;
    const photoSrc = currentPhotoDataUrl || '';

    card.classList.add('filled');
    card.onclick = null;

    card.innerHTML = `
      ${photoSrc ? `<img class="bg-blur" src="${photoSrc}" alt="bg" />` : ''}
      <div class="bright-overlay"></div>
      <div class="content">
        <div style="display:flex;">
          <div class="coin-pill">
            <img class="coin-img" src="${COIN_IMG}" alt="koin" onerror="this.style.display='none'" />
            <span class="coin-amount">${esc(koin)}</span>
          </div>
        </div>
        <div class="avatar-wrap">
          ${photoSrc ? `<img class="avatar-circle" src="${photoSrc}" alt="avatar" />` : `<div class="avatar-placeholder"></div>`}
        </div>
        <div class="bottom-row">
          <div class="name-pill" onclick="event.stopPropagation(); openPopup(this.closest('.card'))">
            <span class="uname">${esc(nama)}</span>
            <span class="plus-icon">+</span>
          </div>
          <button class="mic-btn" onclick="event.stopPropagation()">
            ${MIC_OFF_SVG}
          </button>
        </div>
      </div>
    `;

    closePopup();
  }
</script>
</body>
</html>
